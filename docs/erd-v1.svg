<svg viewBox="0 0 1280 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,system-ui,sans-serif">
<title>orthotomeo — scripture corpus data model v1 (ERD)</title>
<desc>ERD: provenance/reference tables (sources, versification_map, book_names, lexicon, morph_codes), a canonical verses spine, per-source verse_text and words tables, and deferred tables (cross_references, word_alignment).</desc>
<style>
  .bg{fill:#ffffff;}
  .tbl{fill:#f6f8fa;stroke:#8c959f;stroke-width:1.5;}
  .tbld{fill:#fbfcfd;stroke:#d0d7de;stroke-width:1.5;stroke-dasharray:5 4;}
  .hdr{fill:#eaeef2;}
  .tname{font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#1f2328;}
  .tag{font:9px -apple-system,system-ui,sans-serif;fill:#6e7781;}
  .col{font:11px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#424a53;}
  .pkm{font:11px ui-monospace,monospace;fill:#0969da;font-weight:700;}
  .fkm{font:11px ui-monospace,monospace;fill:#6e7781;}
  .zone{font:600 10px -apple-system,system-ui,sans-serif;fill:#6e7781;letter-spacing:.1em;}
  .rel{stroke:#6e7781;stroke-width:1.4;fill:none;}
  .relS{stroke:#0969da;stroke-width:1.3;fill:none;opacity:.75;}
  .reld{stroke:#afb8c1;stroke-width:1.2;stroke-dasharray:4 3;fill:none;}
  .fklbl{font:8.5px ui-monospace,monospace;fill:#8c959f;}
  .cap{font:600 13px -apple-system,system-ui,sans-serif;fill:#1f2328;}
  .ftr{font:10px -apple-system,system-ui,sans-serif;fill:#8c959f;}
</style>
<rect class="bg" x="0" y="0" width="1280" height="700"/>

<text x="30" y="30" class="cap">orthotomeo — scripture corpus data model (v1)</text>

<text x="30" y="58" class="zone">PROVENANCE &amp; REFERENCE</text>
<text x="340" y="58" class="zone">CANON SPINE</text>
<text x="660" y="58" class="zone">TEXT — per source</text>
<text x="990" y="58" class="zone">LEXICON / MORPH</text>

<!-- relationships -->
<path class="rel" d="M460,214 L460,236"/><text x="466" y="230" class="fklbl">book_id</text>
